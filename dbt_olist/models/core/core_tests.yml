version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique

      - name: customer_unique_id
        data_tests:
          - not_null

  - name: dim_products
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique

  - name: dim_sellers
    columns:
      - name: seller_id
        data_tests:
          - not_null
          - unique

  - name: fct_order_items
    columns:
      - name: order_id
        data_tests:
          - not_null

      - name: product_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

      - name: seller_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sellers')
                field: seller_id

  - name: fct_orders
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique

      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: review_score
        data_tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false
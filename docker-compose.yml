services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin12345
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9002:9000"
    environment:
      CLICKHOUSE_DB: warehouse
      CLICKHOUSE_USER: ch_user
      CLICKHOUSE_PASSWORD: ch_pass_123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
  
  airflow-postgres:
    image: postgres:16
    container_name: airflow-postgres
    profiles: ["airflow"]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:3.2.0-python3.12
    container_name: airflow-init
    profiles: ["airflow"]
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:admin"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: "/opt/airflow/config/simple_auth_manager_passwords.json"
      AIRFLOW__API_AUTH__JWT_SECRET: "my-super-long-random-secret-please-change-this-to-64-plus-characters-1234567890"
      AIRFLOW__API_AUTH__JWT_ISSUER: "mini-data-platform-clickhouse"
      _PIP_ADDITIONAL_REQUIREMENTS: "dbt-core==1.10.13 dbt-clickhouse==1.10.0 clickhouse-connect==0.15.1"
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - ./infra/airflow/logs:/opt/airflow/logs
      - ./infra/airflow/plugins:/opt/airflow/plugins
      - ./infra/airflow/config:/opt/airflow/config
      - ./infra/airflow/dbt_profile:/opt/airflow/dbt_profile
      - ./dbt_olist:/opt/airflow/dbt_olist
    command:
      - bash
      - -c
      - |
          airflow db migrate 
        
  airflow-api-server:
    image: apache/airflow:3.2.0-python3.12
    container_name: airflow-api-server
    profiles: ["airflow"]
    restart: unless-stopped
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:admin"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: "/opt/airflow/config/simple_auth_manager_passwords.json"
      AIRFLOW__API_AUTH__JWT_SECRET: "my-super-long-random-secret-please-change-this-to-64-plus-characters-1234567890"
      AIRFLOW__API_AUTH__JWT_ISSUER: "mini-data-platform-clickhouse"
      _PIP_ADDITIONAL_REQUIREMENTS: "dbt-core==1.10.13 dbt-clickhouse==1.10.0 clickhouse-connect==0.15.1"
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - ./infra/airflow/logs:/opt/airflow/logs
      - ./infra/airflow/plugins:/opt/airflow/plugins
      - ./infra/airflow/config:/opt/airflow/config
      - ./infra/airflow/dbt_profile:/opt/airflow/dbt_profile
      - ./dbt_olist:/opt/airflow/dbt_olist
    command:
      - bash
      - -c
      - exec airflow api-server --host 0.0.0.0 --port 8080
      

  airflow-scheduler:
    image: apache/airflow:3.2.0-python3.12
    container_name: airflow-scheduler
    profiles: ["airflow"]
    restart: unless-stopped
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      airflow-api-server:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:admin"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: "/opt/airflow/config/simple_auth_manager_passwords.json"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-api-server:8080/execution/"
      AIRFLOW__API_AUTH__JWT_SECRET: "my-super-long-random-secret-please-change-this-to-64-plus-characters-1234567890"
      AIRFLOW__API_AUTH__JWT_ISSUER: "mini-data-platform-clickhouse"
      _PIP_ADDITIONAL_REQUIREMENTS: "dbt-core==1.10.13 dbt-clickhouse==1.10.0 clickhouse-connect==0.15.1"
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - ./infra/airflow/logs:/opt/airflow/logs
      - ./infra/airflow/plugins:/opt/airflow/plugins
      - ./infra/airflow/config:/opt/airflow/config
      - ./infra/airflow/dbt_profile:/opt/airflow/dbt_profile
      - ./dbt_olist:/opt/airflow/dbt_olist
    command: scheduler

  airflow-dag-processor:
    image: apache/airflow:3.2.0-python3.12
    container_name: airflow-dag-processor
    profiles: ["airflow"]
    restart: unless-stopped
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      airflow-api-server:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:admin"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: "/opt/airflow/config/simple_auth_manager_passwords.json"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-api-server:8080/execution/"
      AIRFLOW__API_AUTH__JWT_SECRET: "my-super-long-random-secret-please-change-this-to-64-plus-characters-1234567890"
      AIRFLOW__API_AUTH__JWT_ISSUER: "mini-data-platform-clickhouse"
      _PIP_ADDITIONAL_REQUIREMENTS: "dbt-core==1.10.13 dbt-clickhouse==1.10.0 clickhouse-connect==0.15.1"
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
      - ./infra/airflow/logs:/opt/airflow/logs
      - ./infra/airflow/plugins:/opt/airflow/plugins
      - ./infra/airflow/config:/opt/airflow/config
      - ./infra/airflow/dbt_profile:/opt/airflow/dbt_profile
      - ./dbt_olist:/opt/airflow/dbt_olist
    command: dag-processor

  metabase-postgres:
    image: postgres:16
    container_name: metabase-postgres
    profiles: ["bi"]
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
      POSTGRES_DB: metabase
    volumes:
      - metabase_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase -d metabase"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    profiles: ["bi"]
    depends_on:
      metabase-postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: metabase-postgres
    volumes:
      - metabase_plugins:/plugins
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:8.2.0
    container_name: kafka
    hostname: kafka
    profiles: ["stream"]
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_LISTENERS: "INTERNAL://kafka:29092,CONTROLLER://kafka:29093,EXTERNAL://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    restart: unless-stopped

volumes:
  clickhouse_data:
  clickhouse_logs:
  airflow_postgres_data:
  metabase_postgres_data:
  metabase_plugins: